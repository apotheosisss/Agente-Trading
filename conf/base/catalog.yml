# ── REPORTING ────────────────────────────────────────
backtest_metrics:
  type: pandas.CSVDataset
  filepath: data/08_reporting/metrics.csv
  save_args:
    encoding: utf-8
  load_args:
    encoding: utf-8

equity_curve:
