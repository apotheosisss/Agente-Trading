# ── RAW ──────────────────────────────────────────────
raw_ohlcv:
  type: pandas.ParquetDataset
  filepath: data/01_raw/ohlcv.parquet
  versioned: true

raw_news:
  type: pandas.JSONDataset
  filepath: data/01_raw/news.json
  versioned: true

# ── INTERMEDIATE ─────────────────────────────────────
clean_ohlcv:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/clean_ohlcv.parquet
  versioned: true

# ── PRIMARY ──────────────────────────────────────────
technical_features:
  type: pandas.ParquetDataset
  filepath: data/03_primary/technical_features.parquet

sentiment_scores:
  type: pandas.ParquetDataset
  filepath: data/03_primary/sentiment_scores.parquet

# ── FEATURE STORE ────────────────────────────────────
feature_vector:
  type: pandas.ParquetDataset
  filepath: data/04_feature/feature_vector.parquet

# ── MODEL OUTPUT ─────────────────────────────────────
trading_signal:
  type: pandas.JSONDataset
  filepath: data/07_model_output/signal.json
  versioned: true

# ── BACKTESTING INTERMEDIATE ─────────────────────────
backtest_portfolio:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/backtest_portfolio.parquet

# ── REPORTING ────────────────────────────────────────
backtest_metrics:
  type: pandas.CSVDataset
  filepath: data/08_reporting/metrics.csv
  save_args:
    encoding: utf-8
  load_args:
    encoding: utf-8

equity_curve:
  type: plotly.PlotlyDataset
  filepath: data/08_reporting/equity_curve.json
  plotly_args:
    type: scatter
    fig:
      x: date
      y: equity
    layout:
      title: Curva de Equity

# ── BENCHMARK ────────────────────────────────────────
benchmark_curve:
  type: plotly.PlotlyDataset
  filepath: data/08_reporting/benchmark_curve.json
  plotly_args:
    type: scatter
    fig:
      x: date
      y: equity
    layout:
      title: Benchmark SPY Buy & Hold

# ── EXECUTION ────────────────────────────────────────
execution_record:
  type: pandas.CSVDataset
  filepath: data/07_model_output/execution_record.csv
  versioned: true
  save_args:
    encoding: utf-8
  load_args:
    encoding: utf-8

portfolio_state:
  type: pandas.CSVDataset
  filepath: data/07_model_output/portfolio_state.csv
  save_args:
    encoding: utf-8
  load_args:
    encoding: utf-8