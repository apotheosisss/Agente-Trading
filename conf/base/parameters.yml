# ── UNIVERSO DE ACTIVOS ───────────────────────────────
# Rama: feature/crypto — inversión corto/mediano plazo
# Universo crypto-heavy: capturar bull runs con rotación entre altcoins
universe:
  # ── Ancla macro ───────────────────────────────────────
  - "SPY"     # S&P 500 — refugio cuando crypto cae; correlación baja
  # ── Crypto large-cap (mayor liquidez) ────────────────
  - "BTC-USD" # Bitcoin — reserva de valor, lidera ciclos
  - "ETH-USD" # Ethereum — DeFi, NFTs, contratos inteligentes
  - "BNB-USD" # Binance Coin — utility token del mayor exchange
  - "XRP-USD" # Ripple — pagos internacionales, regulación aclarada
  - "SOL-USD" # Solana — alta velocidad, ecosistema creciente
  - "AVAX-USD"# Avalanche — L1 competidor de ETH
  - "LINK-USD"# Chainlink — infraestructura oráculos DeFi
  - "DOGE-USD"# Dogecoin — alta liquidez, momentum especulativo
  - "LTC-USD" # Litecoin — "digital silver", ciclo vinculado a BTC
  # ── Acciones proxy crypto (alta correlación, mayor liquidez bolsa) ──
  - "COIN"    # Coinbase — ingresos ligados a volumen crypto, más estable que mineros

ticker: "BTC-USD"      # ticker principal para reportes LLM
timeframe: "1d"
start_date: "2019-01-01"   # incluye ciclo completo: bull 2021 + bear 2022 + recovery
end_date: "2026-04-27"

# ── INDICADORES TÉCNICOS ──────────────────────────────
technical:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  ema_200: 200           # filtro de tendencia principal (200d clasico)

# ── RIESGO ───────────────────────────────────────────
# Crypto: crashes rápidos y profundos (-70%), recuperaciones también rápidas.
# Estrategia: actuar antes ante caídas, re-entrar pronto en rebotes.
risk:
  max_positions: 2              # concentración en top 2: captura el altcoin ganador del ciclo
  stop_loss_atr_mult: 4.5       # optimo: 10 microajustes 3.0-5.7, mejor CAGR+Sharpe en ATR=4.5
  max_position_pct: 0.50        # 50% por posición
  stop_loss_pct: 0.05
  take_profit_pct: 0.10
  # ── Controles de riesgo ────────────────────────────
  min_entry_score: 1.0          # optimo: menor umbral captura momentum naciente en crypto
  max_drawdown_circuit: 0.40    # 40%: en crypto -35% aún puede ser corrección; -40% es bear real
  circuit_break_cooldown: 2     # cooldown corto: crypto rebota rápido (no perder recuperación)
  vix_crisis_threshold: 55      # VIX mide renta variable, no crypto — umbral más alto

# ── AGENTES LLM ──────────────────────────────────────
llm:
  model: "gpt-4o-mini"
  temperature: 0.1
  confidence_threshold: 0.65

# ── POLYMARKET ───────────────────────────────────────
polymarket:
  base_url: "https://gamma-api.polymarket.com"
  min_volume: 5000              # solo mercados con al menos $5k de volumen
  max_score_contribution: 1.5   # aporte máximo al score final (±1.5 puntos)

# ── BACKTESTING ──────────────────────────────────────
backtesting:
  initial_capital: 10000
  commission: 0.001
  rebalance_day: 0              # 0 = lunes (isoweekday - 1)
  walk_forward_split: "2022-01-01"  # in-sample: bull 2019-2021 | OOS: bear 2022 + recovery 2023-2026
  rebalance_interval: 15            # cada 3 semanas — optimo del barrido (CAGR 61.5%, Sharpe 1.091)
