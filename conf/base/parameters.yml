# ── ACTIVOS ───────────────────────────────────────────
ticker: "BTC-USD"
timeframe: "1d"
start_date: "2022-01-01"
end_date: "2024-12-31"

# ── INDICADORES TÉCNICOS ──────────────────────────────
technical:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2

# ── RIESGO ───────────────────────────────────────────
risk:
  max_position_pct: 0.10   # máx 10% del portafolio por trade
  stop_loss_pct: 0.03      # stop-loss en 3%
  take_profit_pct: 0.06    # take-profit en 6%

# ── AGENTES LLM ──────────────────────────────────────
llm:
  model: "gpt-4o-mini"
  temperature: 0.1
  confidence_threshold: 0.65

# ── BACKTESTING ──────────────────────────────────────
backtesting:
  initial_capital: 10000
  commission: 0.001