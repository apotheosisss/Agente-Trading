# ── UNIVERSO DE ACTIVOS ───────────────────────────────
universe:
  - "SPY"     # S&P 500 — referencia de mercado
  - "QQQ"     # Nasdaq 100 — tecnología
  - "GLD"     # Oro — cobertura de riesgo
  - "TLT"     # Bonos 20y — correlación inversa a equity
  - "AAPL"    # Apple — large cap quality
  - "MSFT"    # Microsoft — large cap quality
  - "BTC-USD" # Bitcoin — alta volatilidad / alto potencial

ticker: "SPY"          # ticker principal para reportes LLM
timeframe: "1d"
start_date: "2019-01-01"   # 6 años: COVID 2020 + bear 2022 + recovery
end_date: "2024-12-31"

# ── INDICADORES TÉCNICOS ──────────────────────────────
technical:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  ema_200: 200           # filtro de tendencia principal (200d clasico)

# ── RIESGO ───────────────────────────────────────────
risk:
  max_positions: 3              # posiciones simultáneas máximas
  stop_loss_atr_mult: 2.0       # stop = entrada - (ATR × mult)
  max_position_pct: 0.10        # compatibilidad ejecución
  stop_loss_pct: 0.03
  take_profit_pct: 0.06
  # ── Controles de riesgo avanzados ─────────────────
  min_entry_score: 1.5          # score mínimo para abrir posición (filtra mercados bajistas)
  max_drawdown_circuit: 0.15    # caída > 15% desde pico → liquidar todo (circuit breaker)
  circuit_break_cooldown: 15    # días de espera tras circuit breaker antes de re-entrar
  vix_crisis_threshold: 40      # VIX > 40 → liquidar todo (pánico extremo)

# ── AGENTES LLM ──────────────────────────────────────
llm:
  model: "gpt-4o-mini"
  temperature: 0.1
  confidence_threshold: 0.65

# ── BACKTESTING ──────────────────────────────────────
backtesting:
  initial_capital: 10000
  commission: 0.001
  rebalance_day: 0              # 0 = lunes (isoweekday - 1)
  walk_forward_split: "2022-01-01"  # in-sample hasta aquí, out-of-sample después