# ── UNIVERSO DE ACTIVOS ───────────────────────────────
# Configuración óptima: tech + energía Venezuela (mejor resultado en 5 experimentos)
universe:
  # ── Tech / Growth ─────────────────────────────────────
  - "SPY"     # S&P 500 — referencia / ancla
  - "QQQ"     # Nasdaq 100 — tecnología
  - "NVDA"    # Nvidia — semiconductor / AI líder
  - "META"    # Meta — mega-cap growth
  - "AMZN"    # Amazon — cloud + e-commerce
  - "GOOGL"   # Alphabet — diversificado tech
  - "AAPL"    # Apple — large cap quality
  - "MSFT"    # Microsoft — cloud + AI
  - "BTC-USD" # Bitcoin — alta volatilidad / alto potencial
  - "ETH-USD" # Ethereum — cripto #2
  - "XLK"     # Tech ETF — exposición sectorial amplia
  - "SOXX"    # Semiconductores ETF — ciclo AI
  # ── Energía / Venezuela ───────────────────────────────
  - "CVX"     # Chevron — única empresa EEUU con licencia para operar en Venezuela
  - "SLB"     # SLB (Schlumberger) — servicios petroleros, reconstrucción infraestructura
  - "HAL"     # Halliburton — perforación y completación, operó en Venezuela pre-sanciones
  - "VLO"     # Valero — refinería top EEUU, procesa crudo pesado venezolano
  - "OXY"     # Occidental Petroleum — alta exposición precio crudo, Latinoamérica
  - "XLE"     # Energy ETF — exposición diversificada sector energético

ticker: "QQQ"          # ticker principal para reportes LLM
timeframe: "1d"
start_date: "2019-01-01"   # 6 años: COVID 2020 + bear 2022 + recovery
end_date: "2026-04-27"

# ── INDICADORES TÉCNICOS ──────────────────────────────
technical:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  ema_200: 200           # filtro de tendencia principal (200d clasico)

# ── RIESGO ───────────────────────────────────────────
risk:
  max_positions: 2              # concentración en top 2: captura outsized returns de los ganadores
  stop_loss_atr_mult: 3.0       # stops amplios: growth stocks tienen alta volatilidad
  max_position_pct: 0.50        # 50% por posición (2 posiciones = 100%)
  stop_loss_pct: 0.05
  take_profit_pct: 0.10
  # ── Controles de riesgo ────────────────────────────
  min_entry_score: 2.0          # sólo activos con momentum positivo claro entran
  max_drawdown_circuit: 0.25    # circuit breaker sólo para crashes rápidos (COVID-like)
  circuit_break_cooldown: 3     # cooldown mínimo: re-entra rápido para no perder recuperaciones
  vix_crisis_threshold: 40      # VIX > 40 → liquidar todo (pánico extremo)

# ── AGENTES LLM ──────────────────────────────────────
llm:
  model: "openai/gpt-5-nano"
  temperature: 0.1
  confidence_threshold: 0.65
  # ── TradingAgents (Multi-agent confirmation filter) ─
  tradingagents:
    enabled: true               # filtro de confirmación activo via OpenRouter
    confidence_threshold: 0.60  # solo filtra BUY signals con confidence >= 60%
    top_n_signals: 3            # máximo N signals a analizar por TradingAgents
    # Nota: Requiere ANTHROPIC_API_KEY en credentials.yml
    # Costo estimado: ~$0.30/mes (1 ticker = ~0.01 llamadas a API)

# ── POLYMARKET ───────────────────────────────────────
polymarket:
  base_url: "https://gamma-api.polymarket.com"
  min_volume: 5000              # solo mercados con al menos $5k de volumen
  max_score_contribution: 1.5   # aporte máximo al score final (±1.5 puntos)

# ── BACKTESTING ──────────────────────────────────────
backtesting:
  initial_capital: 10000
  commission: 0.001
  rebalance_day: 0              # 0 = lunes (isoweekday - 1)
  walk_forward_split: "2022-01-01"  # in-sample hasta aquí, out-of-sample después
