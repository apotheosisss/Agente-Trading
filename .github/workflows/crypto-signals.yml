name: Crypto Signals (Daily 08:00 EST)

on:
  schedule:
    - cron: "15 13 * * *"   # 13:15 UTC = 08:15 EST, evita congestion hora en punto
  workflow_dispatch:          # permite ejecutar manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout feature/crypto
        uses: actions/checkout@v4
        with:
          ref: feature/crypto

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install TradingAgents (TauricResearch oficial)
        run: uv run pip install git+https://github.com/TauricResearch/TradingAgents.git || echo "TradingAgents no disponible — filtro de confirmacion desactivado"

      - name: Create credentials.yml from secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          mkdir -p conf/local
          python - <<'PYEOF'
          import os, yaml
          creds = {
              "alpaca": {
                  "api_key": os.environ["ALPACA_API_KEY"],
                  "secret_key": os.environ["ALPACA_SECRET_KEY"],
                  "paper_trading": True,
              },
              "telegram": {
                  "bot_token": os.environ["TELEGRAM_BOT_TOKEN"],
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              },
              "openai": {
                  "api_key": os.environ["OPENAI_API_KEY"],
              },
          }
          with open("conf/local/credentials.yml", "w") as f:
              yaml.dump(creds, f, default_flow_style=False)
          print("credentials.yml creado correctamente")
          PYEOF

      - name: Run signals + Alpaca pipelines
        run: |
          END=$(date +%Y-%m-%d)
          START=$(date -d "400 days ago" +%Y-%m-%d)
          uv run kedro run --pipeline=signals --params="start_date=$START,end_date=$END"
          uv run kedro run --pipeline=alpaca

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          uv run python - <<'PYEOF' || true
          import sys
          from pathlib import Path
          from datetime import datetime, timezone
          sys.path.insert(0, "src")
          import notifier
          import pandas as pd

          signal_dir = Path("data/07_model_output")
          today = datetime.now(timezone.utc).strftime("%d %b %Y")

          # Leer verified_signal (seniales que realmente llegan a Alpaca)
          verified_files = sorted(signal_dir.rglob("verified_signal.json"), key=lambda p: p.stat().st_mtime)
          exec_files     = sorted(signal_dir.rglob("alpaca_orders.csv"),     key=lambda p: p.stat().st_mtime)
          account_files  = sorted(signal_dir.rglob("alpaca_account.csv"),    key=lambda p: p.stat().st_mtime)

          if not verified_files:
              notifier.send(f"Crypto Signals {today}\nPipeline ejecutado sin seniales.")
          else:
              vf = pd.read_json(verified_files[-1])
              n_buy  = int((vf["signal"] == "BUY").sum())
              n_hold = int((vf["signal"] == "HOLD").sum())
              n_sell = int((vf["signal"] == "SELL").sum())
              buys = vf[vf["signal"] == "BUY"][["ticker", "confidence"]].head(3)
              top_str = ", ".join(
                  f"{r['ticker']} ({r['confidence']:.0%})"
                  for _, r in buys.iterrows()
              ) if n_buy > 0 else "ninguno"

              # Ordenes ejecutadas en Alpaca
              exec_str = "ninguna"
              if exec_files:
                  ef = pd.read_csv(exec_files[-1])
                  ordered = ef[ef["status"] == "submitted"]["ticker"].tolist()
                  skipped = ef[ef["status"] == "skipped"]["message"].tolist()
                  exec_str = ", ".join(ordered) if ordered else "ninguna"
                  if skipped and not ordered:
                      exec_str = f"ninguna ({skipped[0]})"

              # Estado de la cuenta
              equity_str = ""
              if account_files:
                  ac = pd.read_csv(account_files[-1])
                  equity = float(ac["equity_usd"].iloc[0])
                  cash   = float(ac["cash_usd"].iloc[0])
                  n_pos  = int(ac["n_positions"].iloc[0])
                  equity_str = f"\nCuenta: ${equity:,.0f} | Cash: ${cash:,.0f} | Pos: {n_pos}"

              msg = (
                  f"Crypto Signals — {today}\n"
                  f"BUY {n_buy} | HOLD {n_hold} | SELL {n_sell}\n"
                  f"Top picks: {top_str}\n"
                  f"Ejecutado: {exec_str}"
                  f"{equity_str}"
              )
              notifier.send(msg)
          PYEOF
