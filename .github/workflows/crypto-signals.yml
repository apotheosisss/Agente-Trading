name: Crypto Signals (Daily 08:00 EST)

on:
  schedule:
    - cron: "0 13 * * *"    # 13:00 UTC = 08:00 EST, todos los dias
  workflow_dispatch:          # permite ejecutar manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout feature/crypto
        uses: actions/checkout@v4
        with:
          ref: feature/crypto

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Create credentials.yml from secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          mkdir -p conf/local
          python - <<'PYEOF'
          import os, yaml
          creds = {
              "alpaca": {
                  "api_key": os.environ["ALPACA_API_KEY"],
                  "secret_key": os.environ["ALPACA_SECRET_KEY"],
                  "paper_trading": True,
              },
              "telegram": {
                  "bot_token": os.environ["TELEGRAM_BOT_TOKEN"],
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              },
              "openai": {
                  "api_key": os.environ["OPENAI_API_KEY"],
              },
          }
          with open("conf/local/credentials.yml", "w") as f:
              yaml.dump(creds, f, default_flow_style=False)
          print("credentials.yml creado correctamente")
          PYEOF

      - name: Run signals pipeline
        run: |
          END=$(date +%Y-%m-%d)
          START=$(date -d "400 days ago" +%Y-%m-%d)
          uv run kedro run --pipeline=signals \
            --params="start_date=$START,end_date=$END"

      - name: Send Telegram notification
        if: always()
        run: uv run python notifier.py || true
