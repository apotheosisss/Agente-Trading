name: Polymarket Signals (Mon-Fri 17:00 EST)

on:
  schedule:
    - cron: "20 21 * * 1-5"  # 21:20 UTC = 16:20 EST, lunes a viernes (evita congestion hora en punto)
  workflow_dispatch:           # permite ejecutar manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout feature/polymarket
        uses: actions/checkout@v4
        with:
          ref: feature/polymarket

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install TradingAgents
        run: uv run pip install tradingagents || echo "TradingAgents no disponible — filtro de confirmacion desactivado"

      - name: Create credentials.yml from secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p conf/local
          python - <<'PYEOF'
          import os, yaml
          creds = {
              "telegram": {
                  "bot_token": os.environ["TELEGRAM_BOT_TOKEN"],
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              },
              "openai": {
                  "api_key": os.environ["OPENAI_API_KEY"],
              },
          }
          with open("conf/local/credentials.yml", "w") as f:
              yaml.dump(creds, f, default_flow_style=False)
          print("credentials.yml creado correctamente")
          PYEOF

      - name: Run signals pipeline
        run: |
          END=$(date +%Y-%m-%d)
          START=$(date -d "400 days ago" +%Y-%m-%d)
          uv run kedro run --pipeline=signals \
            --params="start_date=$START,end_date=$END"

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          uv run python - <<'PYEOF' || true
          import sys
          from pathlib import Path
          sys.path.insert(0, "src")
          import notifier

          signal_dir = Path("data/07_model_output")
          files = sorted(signal_dir.rglob("signal.json"), key=lambda p: p.stat().st_mtime)
          if not files:
              notifier.send("Polymarket Signals: pipeline ejecutado (sin señales encontradas)")
          else:
              import pandas as pd
              df = pd.read_json(files[-1])
              n_buy = int((df["signal"] == "BUY").sum())
              n_sell = int((df["signal"] == "SELL").sum())
              n_hold = int((df["signal"] == "HOLD").sum())
              top = df[df["signal"] == "BUY"]["ticker"].tolist()[:3]
              msg = (
                  f"Polymarket Signals\n"
                  f"BUY={n_buy} | HOLD={n_hold} | SELL={n_sell}\n"
                  f"Top picks: {', '.join(top) if top else 'ninguno'}"
              )
              notifier.send(msg)
          PYEOF
